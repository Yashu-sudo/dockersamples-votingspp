services:
  redis:
    image: redis
    container_name: redis


  db:
    image: postgres:15-alpine
    container_name: db
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:

      - 5432:5432

  vote:
    image: votingimg
    container_name: votecont
    ports:
      - 1717:80
    depends_on:
      - redis

  worker:
    image: workercont
    container_name: workercont
    depends_on:
      - redis
      - db

  result:
    image: resultimage
    container_name: resultcont
    ports:
      - 1818:80
    depends_on:
      - db
